<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#1a1a2e">
    <meta name="description" content="无畏契约30天速成训练计划 - 瞄准、身法、战术综合训练">
    <link rel="manifest" href="manifest.json">
    <title>无畏契约30天速成赋能计划 - 12小时高强度版</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html { scroll-behavior: smooth; }
        body {
            font-family: 'Microsoft YaHei', 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            color: #e0e0e0;
            min-height: 100vh;
            padding: 20px;
            background-attachment: fixed;
            line-height: 1.6;
        }
        .container { max-width: 1200px; margin: 0 auto; }
        .header {
            text-align: center;
            padding: 50px 40px;
            background: linear-gradient(145deg, rgba(30, 30, 60, 0.9), rgba(20, 20, 40, 0.95));
            border-radius: 24px;
            margin-bottom: 30px;
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.15);
            box-shadow: 0 15px 50px rgba(0, 0, 0, 0.4), inset 0 1px 0 rgba(255, 255, 255, 0.1);
            position: relative;
            overflow: hidden;
        }
        .header::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: 
                radial-gradient(circle at 20% 50%, rgba(255, 107, 107, 0.1) 0%, transparent 50%),
                radial-gradient(circle at 80% 50%, rgba(72, 219, 251, 0.1) 0%, transparent 50%);
            pointer-events: none;
        }
        .header h1 {
            font-size: 2.8em;
            margin-bottom: 15px;
            background: linear-gradient(135deg, #ff6b6b 0%, #feca57 50%, #48dbfb 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            animation: gradientShift 4s ease infinite;
            background-size: 200% 200%;
            font-weight: 800;
            letter-spacing: 2px;
            text-shadow: none;
            position: relative;
        }
        .header .subtitle {
            color: rgba(255, 255, 255, 0.7);
            font-size: 1.1em;
            font-weight: 500;
            letter-spacing: 3px;
            text-transform: uppercase;
            position: relative;
        }
        @keyframes gradientShift {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }
        .nav {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-bottom: 30px;
            justify-content: center;
            padding: 15px;
            background: rgba(30, 30, 60, 0.5);
            border-radius: 20px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            position: relative;
            z-index: 100;
        }
        /* ... rest of CSS unchanged ... */
        /* Fixed: removed stray/unscoped declarations that caused syntax error */
    </style>
</head>
<body>
    <div class="container">
        <!-- content unchanged -->
    </div>
    
    <script src="valorant-training-data.js"></script>
    <script src="valorant-training-app.js"></script>
    <!-- added helper scripts: idb utils and runtime fixes that safely override unsafe DOM operations -->
    <script src="idb-utils.js"></script>
    <script src="app-fixes.js"></script>
    
    <script>
        // 改为先检测 service-worker.js 是否存在后再注册，避免控制台报错
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                fetch('service-worker.js', { method: 'HEAD' })
                    .then(res => {
                        if (res.ok) {
                            return navigator.serviceWorker.register('service-worker.js')
                                .then(reg => console.log('ServiceWorker registered:', reg.scope))
                                .catch(err => console.warn('ServiceWorker register failed:', err));
                        } else {
                            console.info('service-worker.js not found; skipping SW registration.');
                        }
                    })
                    .catch(err => console.info('service-worker check failed; skipping SW registration.', err));
            });
        }
    </script>
</body>
</html>
